<div class="flex h-screen bg-bg-base text-text-primary overflow-hidden">

  <!-- ── BACKDROP móvil ──────────────────────────────────────────── -->
  @if (sidebarOpen()) {
    <div class="fixed inset-0 z-40 bg-black/50 backdrop-blur-sm lg:hidden"
         (click)="closeSidebar()"></div>
  }

  <!-- ── SIDEBAR ─────────────────────────────────────────────────── -->
  <aside class="fixed inset-y-0 left-0 z-50 w-60 bg-bg-surface border-r border-border
                flex flex-col shrink-0 transition-all duration-300 overflow-hidden
                lg:static lg:translate-x-0"
         [class.-translate-x-full]="!sidebarOpen()"
         [class.sidebar-desktop-hidden]="!desktopOpen()">

    <div class="h-16 flex items-center justify-between px-5 border-b border-border shrink-0">
      <a routerLink="/" class="font-black text-base tracking-tight select-none">
        NEO<span class="text-accent">GAMING</span>
        <span class="ml-2 text-xs font-medium text-error bg-error/10 px-1.5 py-0.5 rounded align-middle">
          Admin
        </span>
      </a>
      <!-- Cerrar (solo móvil) -->
      <button class="lg:hidden p-1.5 rounded-lg text-text-muted hover:text-text-primary
                     hover:bg-bg-elevated transition-colors"
              (click)="closeSidebar()" aria-label="Cerrar menú">
        <ng-icon name="lucideX" size="18" />
      </button>
    </div>

    <nav class="flex-1 p-3 space-y-0.5 overflow-y-auto">
      <a routerLink="/admin"
         routerLinkActive="bg-bg-subtle text-text-primary border-l-2 border-accent"
         [routerLinkActiveOptions]="{ exact: true }"
         (click)="closeSidebar()"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-secondary hover:bg-bg-subtle hover:text-text-primary transition-colors">
        <ng-icon name="lucideHouse" size="16" />
        Inicio
      </a>
      <a routerLink="/admin/users"
         routerLinkActive="bg-bg-subtle text-text-primary border-l-2 border-accent"
         (click)="closeSidebar()"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-secondary hover:bg-bg-subtle hover:text-text-primary transition-colors">
        <ng-icon name="lucideUser" size="16" />
        Usuarios
      </a>
      <a routerLink="/admin/sellers"
         routerLinkActive="bg-bg-subtle text-text-primary border-l-2 border-accent"
         (click)="closeSidebar()"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-secondary hover:bg-bg-subtle hover:text-text-primary transition-colors">
        <ng-icon name="lucideUsers" size="16" />
        Vendedores
      </a>
      <a routerLink="/admin/reviews"
         routerLinkActive="bg-bg-subtle text-text-primary border-l-2 border-accent"
         (click)="closeSidebar()"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-secondary hover:bg-bg-subtle hover:text-text-primary transition-colors">
        <ng-icon name="lucideStar" size="16" />
        Reseñas
      </a>
      <a routerLink="/admin/invoices"
         routerLinkActive="bg-bg-subtle text-text-primary border-l-2 border-accent"
         (click)="closeSidebar()"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-secondary hover:bg-bg-subtle hover:text-text-primary transition-colors">
        <ng-icon name="lucideFileText" size="16" />
        Facturas
      </a>
      <a routerLink="/admin/categories"
         routerLinkActive="bg-bg-subtle text-text-primary border-l-2 border-accent"
         (click)="closeSidebar()"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-secondary hover:bg-bg-subtle hover:text-text-primary transition-colors">
        <ng-icon name="lucideTag" size="16" />
        Categorías
      </a>
      <a routerLink="/admin/brands"
         routerLinkActive="bg-bg-subtle text-text-primary border-l-2 border-accent"
         (click)="closeSidebar()"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-secondary hover:bg-bg-subtle hover:text-text-primary transition-colors">
        <ng-icon name="lucideShoppingBag" size="16" />
        Marcas
      </a>
      <a routerLink="/admin/analytics"
         routerLinkActive="bg-bg-subtle text-text-primary border-l-2 border-accent"
         (click)="closeSidebar()"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-secondary hover:bg-bg-subtle hover:text-text-primary transition-colors">
        <ng-icon name="lucideTrendingUp" size="16" />
        Analytics
      </a>
      <a routerLink="/admin/messages"
         routerLinkActive="bg-bg-subtle text-text-primary border-l-2 border-accent"
         (click)="closeSidebar()"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-secondary hover:bg-bg-subtle hover:text-text-primary transition-colors">
        <ng-icon name="lucideMessageCircle" size="16" />
        Mensajes
      </a>
    </nav>

    <div class="p-3 border-t border-border shrink-0">
      <p class="px-3 py-2 text-xs text-text-muted">Admin Panel</p>
    </div>

  </aside>

  <!-- ── CONTENIDO PRINCIPAL ─────────────────────────────────────── -->
  <div class="flex flex-col flex-1 min-w-0">

    <header class="h-16 bg-bg-surface border-b border-border flex items-center justify-between px-4 sm:px-6 shrink-0">
      <div class="flex items-center gap-3">
        <!-- Hamburger (móvil) -->
        <button class="lg:hidden p-2 rounded-lg text-text-secondary hover:text-text-primary
                       hover:bg-bg-subtle transition-colors"
                (click)="sidebarOpen.set(true)" aria-label="Abrir menú">
          <ng-icon name="lucideMenu" size="20" />
        </button>
        <!-- Toggle sidebar (escritorio) -->
        <button class="hidden lg:flex p-2 rounded-lg text-text-secondary hover:text-text-primary
                       hover:bg-bg-subtle transition-colors"
                (click)="desktopOpen.set(!desktopOpen())" aria-label="Toggle sidebar">
          <ng-icon name="lucideMenu" size="20" />
        </button>
        <span class="text-sm font-medium text-text-secondary">Panel de administración</span>
      </div>
      <div class="flex items-center gap-3">
        <button (click)="theme.toggle()"
          class="flex items-center justify-center w-9 h-9 rounded-lg
                 text-text-secondary hover:text-text-primary hover:bg-bg-subtle
                 transition-colors duration-200"
          [attr.aria-label]="theme.isDark() ? 'Activar modo claro' : 'Activar modo oscuro'">
          @if (theme.isDark()) {
            <ng-icon name="lucideSun" size="18" />
          } @else {
            <ng-icon name="lucideMoon" size="18" />
          }
        </button>
        <a routerLink="/" class="text-xs text-text-muted hover:text-text-secondary transition-colors hidden sm:inline">
          Ver marketplace →
        </a>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 sm:p-6">
      <router-outlet />
    </main>

  </div>

  <app-neo-ai-fab [isOpen]="chatOpen() || onMessagesRoute()" (toggle)="toggleChat()" />
  <app-analytics-chat [isOpen]="chatOpen()" (close)="chatOpen.set(false)" />

</div>
