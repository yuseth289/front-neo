<div class="flex h-screen bg-bg-base text-text-primary overflow-hidden">

  <aside class="w-60 bg-bg-surface border-r border-border flex flex-col shrink-0">

    <div class="h-16 flex items-center px-5 border-b border-border shrink-0">
      <a routerLink="/" class="font-black text-base tracking-tight select-none">
        NEO<span class="text-accent">GAMING</span>
        <span class="ml-2 text-xs font-medium text-error bg-error/10 px-1.5 py-0.5 rounded align-middle">
          Admin
        </span>
      </a>
    </div>

    <nav class="flex-1 p-3 space-y-0.5 overflow-y-auto">
      <a routerLink="/admin"
         routerLinkActive="bg-bg-subtle text-text-primary border-l-2 border-accent"
         [routerLinkActiveOptions]="{ exact: true }"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-secondary hover:bg-bg-subtle hover:text-text-primary transition-colors">
        <ng-icon name="lucideHouse" size="16" />
        Inicio
      </a>
      <a routerLink="/admin/sellers"
         routerLinkActive="bg-bg-subtle text-text-primary border-l-2 border-accent"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-secondary hover:bg-bg-subtle hover:text-text-primary transition-colors">
        <ng-icon name="lucideUsers" size="16" />
        Vendedores
      </a>
      <a routerLink="/admin/reviews"
         routerLinkActive="bg-bg-subtle text-text-primary border-l-2 border-accent"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-secondary hover:bg-bg-subtle hover:text-text-primary transition-colors">
        <ng-icon name="lucideStar" size="16" />
        Reseñas
      </a>
      <a routerLink="/admin/invoices"
         routerLinkActive="bg-bg-subtle text-text-primary border-l-2 border-accent"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-secondary hover:bg-bg-subtle hover:text-text-primary transition-colors">
        <ng-icon name="lucideFileText" size="16" />
        Facturas
      </a>
      <a routerLink="/admin/categories"
         routerLinkActive="bg-bg-subtle text-text-primary border-l-2 border-accent"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-secondary hover:bg-bg-subtle hover:text-text-primary transition-colors">
        <ng-icon name="lucideTag" size="16" />
        Categorías
      </a>
      <a routerLink="/admin/analytics"
         routerLinkActive="bg-bg-subtle text-text-primary border-l-2 border-accent"
         class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-text-secondary hover:bg-bg-subtle hover:text-text-primary transition-colors">
        <ng-icon name="lucideTrendingUp" size="16" />
        Analytics
      </a>
    </nav>

    <div class="p-3 border-t border-border shrink-0">
      <!-- Phase 2: info del admin autenticado -->
      <p class="px-3 py-2 text-xs text-text-muted">Admin Panel</p>
    </div>

  </aside>

  <div class="flex flex-col flex-1 min-w-0">

    <header class="h-16 bg-bg-surface border-b border-border flex items-center justify-between px-6 shrink-0">
      <span class="text-sm font-medium text-text-secondary">Panel de administración</span>
      <div class="flex items-center gap-3">
        <button (click)="theme.toggle()"
          class="flex items-center justify-center w-9 h-9 rounded-lg
                 text-text-secondary hover:text-text-primary hover:bg-bg-subtle
                 transition-colors duration-200"
          [attr.aria-label]="theme.isDark() ? 'Activar modo claro' : 'Activar modo oscuro'">
          @if (theme.isDark()) {
            <ng-icon name="lucideSun" size="18" />
          } @else {
            <ng-icon name="lucideMoon" size="18" />
          }
        </button>
        <a routerLink="/" class="text-xs text-text-muted hover:text-text-secondary transition-colors">
          Ver marketplace →
        </a>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-6">
      <router-outlet />
    </main>

  </div>

</div>
